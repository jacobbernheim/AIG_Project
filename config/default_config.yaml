# AlphaGenome configuration for Sox2 expression prediction

# Model settings
model:
  name: "alphagenome"
  model_checkpoint: "model_all_folds.safetensors"
  organism: "mouse"  # "human" or "mouse"
  device: null  # null for auto-detect, "cuda" or "cpu" for explicit
  cache_dir: "models/"

# Inference settings
inference:
  prediction_resolution: 1  # 1 or 128 bp resolution
  available_tracks:
    - "atac"
    - "dnase"
    - "chip_histone"
    - "chip_tf"
    - "rna_seq"
  feature_aggregation: "mean"  # "mean", "max", or "concat"

# Deterministic zero-shot scoring settings
zero_shot:
  organism: mouse
  reference_pl: "PL018"
  requested_tracks:
    - dnase
    - chip_histone
    - chip_tf
  signal_threshold: 0.0  # increase to e.g. 0.01 if padded portions of sequence are getting non-zero predictions that are contributing
  weights:
    dnase: 1.0
    h3k27ac: 1.0
    h3k4me1: 0.8
    ep300: 0.6

# Data settings
data:
  raw_path: "data/raw/"
  processed_path: "data/processed/"
  sequence_min_length: 128
  sequence_max_length: 1048576  # 1 Mb, AlphaGenome max
  train_test_split: 0.8

# Expression prediction head
expression_head:
  input_dim: 256
  hidden_dim: 128
  
# Training settings (for fine-tuning later)
training:
  batch_size: 8
  learning_rate: 1e-4
  num_epochs: 50
  early_stopping_patience: 5
  val_split: 0.1
  loss: "mse"  # mean squared error for regression
  
# Evaluation settings
evaluation:
  metrics:
    - "rmse"
    - "mae"
    - "pearson_correlation"
    - "classification_accuracy"
  classification_tolerance: 0.2

# Output settings
output:
  results_dir: "results/"
  save_predictions: true
  save_model: true
  save_embeddings: false
