name: sox2-alphagenome-gpu
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11
  
  # Core dependencies
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  - pyyaml>=5.4.0
  
  # PyTorch with CUDA support (for GPU)
  # CUDA 12.1 is widely compatible across different HPC systems
  - pytorch::pytorch=2.5.1
  - pytorch::torchvision=0.20.1
  - pytorch::pytorch-cuda=12.1
  
  # ML/Data
  - scikit-learn>=1.0.0
  - matplotlib>=3.4.0
  - seaborn>=0.11.0
  
  # Jupyter (optional, for notebooks)
  - jupyter>=1.0.0
  - ipykernel>=6.0.0
  
  # Development
  - pytest>=6.2.0
  - black>=21.0
  
  # Additional utilities
  - git
  
  # From pip (for packages not in conda)
  - pip

# alphagenome-pytorch is installed via pip (see setup.sh)
