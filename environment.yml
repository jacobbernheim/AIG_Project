name: sox2-alphagenome
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.12

  # Core dependencies
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  - pyyaml>=5.4.0

  # PyTorch from conda-forge (CPU-only, works on macOS)
  - conda-forge::pytorch=2.5.1
  - conda-forge::torchvision=0.20.1

  # ML/Data
  - scikit-learn>=1.0.0
  - matplotlib>=3.4.0
  - seaborn>=0.11.0

  # Jupyter (optional, for notebooks)
  - jupyter>=1.0.0
  - ipykernel>=6.0.0

  # Development
  - pytest>=6.2.0
  - black>=21.0

  # Additional utilities
  - git

  # From pip (for packages not in conda)
  - pip

  - pip:
      - alphagenome-pytorch==0.3.1
      - huggingface-hub>=0.16.0
      - pyfaidx>=0.7.0

# AlphaGenome PyTorch is pinned to the documented release line used by the README/docs.
